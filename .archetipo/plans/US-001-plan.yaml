spec_code: US-001
body: |-
  # US-001: Scaffold del progetto React PWA e ambiente di sviluppo — Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-06-17

  ---

  ## Spec

  **Epica:** EP-000 — Foundation del Progetto
  **Priorità:** HIGH | **Punti:** 3

  **User Story**
  In qualità di sviluppatore del team,
  voglio un ambiente di sviluppo locale funzionante con scaffold React + Vite + TypeScript e suite di test configurata,
  così da avviare immediatamente lo sviluppo delle funzionalità senza configurazioni manuali.

  **Criteri di Accettazione**
  - [ ] Il progetto React 18 + Vite 5 + TypeScript 5 è scaffoldato con struttura feature-based conforme all'architettura definita nel PRD
  - [ ] Vitest, React Testing Library e Playwright sono configurati con almeno un test di esempio funzionante per ogni layer
  - [ ] ESLint e type-check TypeScript passano senza errori sul codice iniziale
  - [ ] Il manifest PWA e il service worker di base sono configurati: la PWA è installabile localmente
  - [ ] Il file `.env.example` documenta le variabili d'ambiente necessarie (chiavi Supabase, VAPID)

  ---

  ## Soluzione Tecnica

  Inizia con `pnpm create vite pharmamia-mvp --template react-ts` e adegua immediatamente la struttura alle convenzioni architetturali del PRD (feature-based layout, supabase/, tests/). Tutto il tooling viene configurato in una sequenza lineare senza dipendenze esterne.

  - **Scaffold:** `pnpm create vite pharmamia-mvp --template react-ts` (React 18, Vite 5, TS 5). Configurare `tsconfig.json` con `strict: true`, `baseUrl: "src"` e path aliases (`@features/*`, `@shared/*`, `@domain/*`) per rendere gli import delle spec successive consistenti fin dall'inizio.
  - **Feature-based layout:** creare le directory `src/features/{inventory,scanning,therapy,household,lending,notifications,auth}/`, `src/shared/`, `src/domain/`, `src/pwa/`, `supabase/{migrations,functions,seed}/`, `tests/` come da PRD. Mantenere un `App.tsx` minimale nel root che funge da entry point.
  - **Testing stack:** Vitest + jsdom per unit e component test (integrato in vite.config.ts, nessuna config Jest separata); React Testing Library + `@testing-library/jest-dom` per i component test; Playwright per gli e2e. Script: `pnpm test` (Vitest watch/run), `pnpm test:e2e` (Playwright), `pnpm type-check` (tsc --noEmit).
  - **PWA:** `vite-plugin-pwa` (Workbox) configurato con manifest completo (name: "PharmaMia", short_name: "PharmaMia", icons 192x192 e 512x512, start_url: "/", display: "standalone", theme_color) e strategia di pre-caching delle risorse statiche. L'app deve risultare installabile su Chrome/Edge su localhost.
  - **ESLint:** `@typescript-eslint/parser` + `@typescript-eslint/eslint-plugin` + `eslint-plugin-react` + `eslint-plugin-react-hooks`. Script `pnpm lint` deve passare clean sul codice di scaffold.
  - **Variabili d'ambiente:** `.env.example` con `VITE_SUPABASE_URL`, `VITE_SUPABASE_PUBLISHABLE_KEY`, `VITE_VAPID_PUBLIC_KEY` (client-side) e `VAPID_PRIVATE_KEY` (server-side, Edge Functions), ciascuna con commento descrittivo. `.env` aggiunto a `.gitignore`.

  ---

  ## Strategia di Test

  Lo scopo è verificare che l'ambiente funzioni correttamente su una macchina pulita — non testare logica applicativa (ancora inesistente), ma certificare che ogni layer del testing stack sia operativo.

  - **Unit (Vitest):** un test su una funzione stub in `src/domain/` (es. `formatExpiryDate`) che valida la configurazione Vitest + TypeScript strict.
  - **Component (React Testing Library):** un test su `App.tsx` che verifica il rendering del componente root senza errori.
  - **E2E (Playwright):** uno scenario smoke che apre `http://localhost:5173`, verifica il caricamento della pagina e la presenza dell'heading principale. Video recording abilitato, output salvato in `docs/test-results/US-001/`.

  ### Test E2E — Simulazione Utente

  **Framework:** Playwright (esplicitamente richiesto dai criteri di accettazione)
  **Video recording:** Abilitato per tutti gli scenari, video salvati in `docs/test-results/US-001/`

  | Scenario | Descrizione del flusso utente |
  |---|---|
  | Smoke — app avviata | Lo sviluppatore apre `http://localhost:5173`: la pagina si carica in meno di 3s, il titolo dell'app è visibile nel DOM. |
  | PWA installabile | Lo sviluppatore apre l'app su Chrome/Edge: il manifest è servito correttamente (`/manifest.webmanifest` risponde 200), il service worker si registra senza errori nella console. |

  ---

  _Piano generato via ARchetipo Planning — 2026-06-17_
