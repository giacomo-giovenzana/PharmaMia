  - id: TASK-01
    title: Inizializzare il progetto Vite + React 18 + TypeScript 5 con pnpm
    description: 'Eseguire `pnpm create vite pharmamia-mvp --template react-ts`. Configurare tsconfig.json con strict: true, baseUrl: "src" e path aliases (@features/*, @shared/*, @domain/*). Verificare che `pnpm install && pnpm dev` avvii l''app su localhost:5173.'
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: Strutturare il progetto con layout feature-based conforme al PRD
    description: Creare le directory src/features/{inventory,scanning,therapy,household,lending,notifications,auth}/, src/shared/, src/domain/, src/pwa/, supabase/{migrations,functions,seed}/, tests/. Mantenere App.tsx minimale come entry point e aggiornare gli import.
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
  - id: TASK-03
    title: Configurare Vitest e React Testing Library con test di esempio
    description: Installare vitest, @testing-library/react, @testing-library/jest-dom e jsdom. Configurare Vitest in vite.config.ts con environment jsdom. Aggiungere script `test` in package.json. Creare un test unit stub in src/domain/ e un test RTL su App.tsx — entrambi devono passare con `pnpm test`.
    type: Impl
    status: DONE
    dependencies:
      - TASK-02
    ref: TASK-03
  - id: TASK-04
    title: Configurare ESLint con TypeScript strict e garantire clean pass
    description: Installare eslint, @typescript-eslint/parser, @typescript-eslint/eslint-plugin, eslint-plugin-react, eslint-plugin-react-hooks. Aggiungere script `lint` e `type-check` (tsc --noEmit). Verificare che entrambi passino senza errori sul codice di scaffold.
    type: Impl
    status: DONE
    dependencies:
      - TASK-02
    ref: TASK-04
  - id: TASK-05
    title: Configurare PWA con vite-plugin-pwa (manifest + service worker Workbox)
    description: 'Installare vite-plugin-pwa. Configurare il manifest PWA (name, short_name, icons 192x192/512x512, start_url: "/", display: standalone, theme_color) e la strategia Workbox di pre-caching. Aggiungere le icone placeholder in public/. Verificare installabilità su Chrome/Edge localhost.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-02
    ref: TASK-05
  - id: TASK-06
    title: Creare .env.example con le variabili d'ambiente necessarie
    description: Documentare VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, VITE_VAPID_PUBLIC_KEY e VAPID_PRIVATE_KEY con commenti descrittivi. Verificare che .env sia nel .gitignore. Aggiungere note sul reperimento delle chiavi VAPID (npx web-push generate-vapid-keys).
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-06
  - id: TASK-07
    title: Configurare Playwright con test e2e smoke e video recording
    description: 'Installare @playwright/test ed eseguire `npx playwright install --with-deps chromium`. Creare playwright.config.ts con baseURL http://localhost:5173, video: ''on'', outputDir docs/test-results/US-001/. Aggiungere script `test:e2e`. Scrivere due scenari smoke (caricamento app, manifest PWA) — entrambi devono passare.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-03
    ref: TASK-07
  - id: TASK-08
    title: Verifica finale di tutti i criteri di accettazione US-001
    description: 'Eseguire in sequenza: `pnpm install && pnpm dev` (app avviata), `pnpm test` (Vitest clean), `pnpm lint && pnpm type-check` (nessun errore), `pnpm test:e2e` (Playwright green). Verificare manualmente installabilità PWA su Chrome. Documentare i comandi chiave nel README.'
    type: Test
    status: DONE
    dependencies:
      - TASK-03
      - TASK-04
      - TASK-05
      - TASK-06
      - TASK-07
    ref: TASK-08
