  - id: TASK-01
    title: Astrazione scanner barcode con BarcodeDetector + fallback ZXing
    description: Installare la dipendenza `@zxing/library` e creare `src/features/scanning/barcodeScanner.ts` + hook `useBarcodeScanner` che gestisce getUserMedia, scelta runtime del backend (nativo vs ZXing), toggle torcia e cleanup.
    type: Impl
    status: DONE
    ref: TASK-01
