    title: Unit test selezione scanner e ciclo di vita fotocamera
    description: Testare con global mockati che lo scanner usi BarcodeDetector quando presente e ricada su ZXing quando assente, e che lo stream venga avviato/fermato correttamente.
    type: Test
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
