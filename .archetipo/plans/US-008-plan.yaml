    description: 'In MedicineFormPage.tsx convertire il banner di validazione unico in errore inline sotto il campo Nome obbligatorio: stato per-campo, messaggio inline, aria-invalid + aria-describedby e focus sul campo non valido; il banner mf-error-banner resta solo per errori di salvataggio/rete. Aggiungere lo stile inline in medicine-form.css.'
    type: Impl
    status: DONE
    ref: TASK-01
