schema: archetipo/plan/v2
spec_code: US-008
body: "# US-008: Aggiunta manuale farmaco (fallback alla scansione) — Piano di Implementazione\n\n**Generato da:** Team di Planning ARchetipo\n**Data:** 2026-06-17\n\n---\n\n## Spec\n\n**Epica:** EP-002 — Inventario Farmaci\n**Priorità:** HIGH | **Punti:** 2\n\n**User Story**\nIn qualità di Giulia (caregiver di famiglia), voglio inserire manualmente un farmaco quando la scansione non è disponibile o il farmaco non è nel database AIFA, così da poter sempre completare il mio inventario anche in condizioni non ideali.\n\n**Criteri di Accettazione**\n- L'utente può accedere al form di inserimento manuale dalla stessa schermata della scansione\n- Il form permette di inserire nome del farmaco (obbligatorio), principio attivo e formato\n- Il farmaco inserito manualmente è salvato nell'inventario e indistinguibile da uno scansionato nelle funzionalità successive\n- La validazione del form mostra errori inline per i campi obbligatori mancanti\n\n---\n\n## Soluzione Tecnica\n\n**Premessa importante:** gran parte di questa spec è già stata consegnata come parte di US-007 (scansione + fallback manuale). Il form manuale `src/features/inventory/MedicineFormPage.tsx` (route protetta `/medicine/new`) e i punti d'ingresso \"Inserisci manualmente\" sulla `ScanPage` esistono già e coprono **AC1, AC2 e AC3**. L'unico criterio non ancora soddisfatto è **AC4** (validazione *inline per-campo*): oggi il form mostra un singolo banner di errore in fondo (`mf-error-banner`), non un errore inline accanto al campo. Questa spec quindi **completa e indurisce** il flusso manuale già esistente, senza introdurre nuova architettura, dipendenze, migration o route.\n\nMappatura criteri → stato attuale:\n\n- **AC1 (accesso dalla stessa schermata):** già soddisfatto. `ScanPage.tsx` espone \"Inserisci manualmente\" in tre stati — schermata idle, overlay di errore fotocamera (permesso negato / fotocamera assente) e bottom sheet \"farmaco non trovato\" — tutti navigano a `/medicine/new` senza draft. Da consolidare con copertura e2e dedicata, nessuna modifica di codice prevista.\n- **AC2 (nome obbligatorio, principio attivo, formato):** già soddisfatto. Il form ha `Nome *` (required), `Principio attivo` e `Forma`.\n- **AC3 (salvato e indistinguibile):** già soddisfatto a livello di dominio. Manuale e scansionato finiscono nella stessa tabella `medications` (US-002); l'inserimento manuale usa `catalog_id = null` e copia `name`, mentre principio attivo e forma vengono persistiti nel campo `notes`. Tutte le funzionalità successive operano sulla riga `medications` (nome, quantità, scadenza, posizione) e non distinguono l'origine. *Assunzione accettata:* non si modifica lo schema; l'asimmetria di modellazione (principio/forma in `notes` per il manuale vs join sul catalogo per lo scansionato) resta invariata, coerente con US-007 e adeguata all'MVP in assenza di una pagina di dettaglio inventario (fuori scope).\n- **AC4 (errori inline per i campi obbligatori):** **gap da chiudere.** Si sostituisce il banner unico con una validazione a livello di campo per il campo obbligatorio `Nome`.\n\nScelte chiave dell'intervento:\n\n- **Validazione inline per-campo (`MedicineFormPage.tsx`):** si introduce uno stato di errore per il campo `Nome` (es. `nameError`). Al submit con nome vuoto si renderizza un messaggio inline immediatamente sotto il campo, si imposta `aria-invalid=\"true\"` e `aria-describedby` che punta all'id del messaggio, e si sposta il focus sul campo non valido (accessibilità, persona Marco). L'errore si azzera appena l'utente digita un nome valido. Il banner generale (`mf-error-banner`) viene mantenuto **solo** per errori di salvataggio/rete (fallimento RPC `ensure_personal_household` o insert), non più per la validazione dei campi.\n- **Stili (`medicine-form.css`):** nuova classe per il messaggio di errore inline (es. `.form-error`) e stato visivo del campo non valido (bordo `--c-danger`), coerente con il design system esistente e con il mockup `docs/mockups/pharmamia-mvp/medicine.html`.\n- **Nessun cambiamento** a routing, schema DB, RPC, `drugLookup` o alla `ScanPage`: lo scope è la sola UX di validazione del form più la copertura di test del flusso manuale.\n\n**Assunzioni e questioni aperte**\n- Pagina lista/dettaglio inventario fuori scope (spec separata): la verifica e2e di \"appare nell'inventario\" si limita a intercettare l'insert su `medications` e il redirect alla home, come già fa US-007.\n- Solo `Nome` è obbligatorio: la validazione inline riguarda questo campo; quantità mantiene il controllo non-negativo esistente.\n- Nessuna modifica al modello dati per principio attivo/forma del manuale (restano in `notes`).\n\n---\n\n## Strategia di Test\n\nLa strategia si concentra sul gap reale (validazione inline) e sulla copertura del flusso manuale puro non ancora coperto da US-007, su due livelli: componente (RTL) ed e2e utente.\n\n- **Component (Vitest + React Testing Library):** estendere `MedicineFormPage.test.tsx` — submit con nome vuoto mostra l'errore **inline** sotto il campo `Nome` (non più solo banner), il campo ha `aria-invalid=\"true\"` e nessun insert viene invocato; digitando un nome valido l'errore inline scompare; submit manuale valido (nome + principio attivo + forma, **senza** draft) invoca `ensure_personal_household` e l'insert in `medications` con `catalog_id null` e principio/forma persistiti nelle `notes`. Aggiornare i test US-007 esistenti che si aspettavano il banner di validazione.\n- **Regressione:** verificare che i punti d'ingresso \"Inserisci manualmente\" della `ScanPage` (idle, errore fotocamera, non trovato) continuino a navigare a `/medicine/new` con form vuoto (nessun chip AIFA).\n\n### Test E2E — Simulazione Utente\n\n**Framework:** Playwright (già configurato; pattern video `test.use({ video: 'on' })` come nei demo di US-007)\n**Registrazione video:** Abilitata per tutti gli scenari — output in `docs/test-results/US-008/` (via `E2E_OUTPUT_DIR`)\n\nNota tecnica: riuso degli helper esistenti `installAuthMock` e `installScanSeam`; le chiamate Supabase vengono intercettate via `page.route()`, il codice di produzione resta invariato.\n\n| Scenario | Descrizione del flusso utente |\n|---|---|\n| Inserimento manuale puro dalla schermata di scansione | Utente autenticato apre l'app, va su \"Aggiungi farmaco\" → schermata di scansione, tocca \"Inserisci manualmente\" dallo stato idle, compila nome + principio attivo + formato nel form vuoto, salva e viene riportato alla home con il farmaco registrato (insert su `medications` con `catalog_id null` intercettato) |\n| Validazione inline campo obbligatorio | Nel form di inserimento manuale l'utente invia senza compilare il nome: appare un messaggio di errore **inline** sotto il campo Nome, il campo è marcato non valido e nessun salvataggio viene eseguito; compilando il nome l'errore scompare e il salvataggio va a buon fine |\n\n---\n\n> \U0001F3A8 Mockup di riferimento esistente: `docs/mockups/pharmamia-mvp/medicine.html` (form farmaco).\n\n_Piano generato tramite ARchetipo Planning — 2026-06-17_"
