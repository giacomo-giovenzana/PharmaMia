<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaMia – Account</title>
<link rel="stylesheet" href="../pharmamia-mvp/shared.css">
<link rel="stylesheet" href="auth.css">
<style>
  /* Faux dashboard behind the overlay (purely decorative) */
  .faux-greeting {
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 20px 16px; background: var(--c-surface);
  }
  .faux-tag { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--c-text-3); }
  .faux-name { font-family: var(--f-display); font-size: 1.4rem; font-weight: 600; color: var(--c-text); }
</style>
</head>
<body>
<div class="shell">
<div class="phone">

  <!-- BACKGROUND: faux dashboard so the sheet reads as an overlay -->
  <div class="screen" style="padding-bottom:0;filter:saturate(.9)">
    <div class="faux-greeting">
      <div>
        <div class="faux-tag">Mercoledì 17 giugno</div>
        <div class="faux-name">Ciao, Giulia 👋</div>
      </div>
      <div class="avatar avatar-teal" style="width:40px;height:40px;font-size:.85rem">GI</div>
    </div>
    <div class="section">
      <div class="alert-card warning">
        <div class="alert-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="alert-content">
          <div class="alert-title" style="color:var(--c-warning)">Tachipirina scade tra 5 giorni</div>
          <div class="alert-desc">Scadenza: 22/06/2026</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ ACCOUNT SHEET (default visible) ============ -->
  <div class="overlay-backdrop" id="sheet">
    <div class="account-sheet slide-up">

      <div class="account-head">
        <div class="avatar avatar-teal" style="width:48px;height:48px;font-size:1rem">GI</div>
        <div class="account-head-info">
          <div class="account-head-name">Giulia Bianchi</div>
          <div class="account-head-mail">giulia@email.it</div>
        </div>
        <span class="caregiver-chip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Caregiver
        </span>
      </div>

      <button class="account-menu-item">
        <span class="account-menu-ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <span class="account-menu-label">Il mio profilo</span>
        <span class="account-menu-chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </button>

      <button class="account-menu-item">
        <span class="account-menu-ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </span>
        <span class="account-menu-label">Impostazioni</span>
        <span class="account-menu-chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </button>

      <div class="divider" style="margin:8px 0"></div>

      <button class="account-menu-item danger" onclick="document.getElementById('confirm').style.display='flex'">
        <span class="account-menu-ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </span>
        <span class="account-menu-label">Esci</span>
      </button>

      <button class="btn btn-ghost btn-full mt-8" onclick="document.getElementById('sheet').style.display='none'">Chiudi</button>
    </div>
  </div>

  <!-- ============ LOGOUT CONFIRM (hidden until "Esci") ============ -->
  <div class="confirm-wrap" id="confirm" style="display:none">
    <div class="confirm-card slide-up">
      <div class="confirm-ico">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
      <h2 class="confirm-title">Vuoi uscire?</h2>
      <p class="confirm-desc">La sessione verrà chiusa su questo dispositivo. Dovrai inserire di nuovo le tue credenziali per rientrare.</p>
      <div class="confirm-actions">
        <button class="btn btn-danger btn-full" onclick="window.location.href='login.html'">Esci dall'account</button>
        <button class="btn btn-ghost btn-full" onclick="document.getElementById('confirm').style.display='none'">Annulla</button>
      </div>
    </div>
  </div>

</div>
</div>
</body>
</html>
